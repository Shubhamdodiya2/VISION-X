<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script type="module" src="./src/js/firebase.js"></script>
  <link rel="shortcut icon" href="logo-vision_X.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/css/utils.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="stylesheet" href="./src/css/responsive.css">
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .navbar {
      width: 100%;
    }

    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 85px);
      /* Subtract navbar height */
      padding: 20px;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 150px rgba(0, 0, 0, 0.15);
      border: 1px solid #ccc;
      font-weight: 500;
      margin: 40px auto 20px;
      /* Reduced top margin */
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      h2 {
        font-size: 1.5rem;
      }
    }


    h2 {
      text-align: center;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px;
      padding-right: 40px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 38px;
      cursor: pointer;
      color: #555;
    }

    .inline-feedback {
      font-size: 0.85rem;
      color: red;
      margin-top: 5px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .forgot-password {
      display: block;
      text-align: right;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: black;
      text-decoration: none;
    }

    .signup-page {
      display: block;
      text-align: center;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: black;
      text-decoration: none;
      margin-top: 1rem;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background-color: #0a0a0a;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:disabled {
      background-color: #999;
    }

    .spinner {
      display: none;
      width: 24px;
      height: 24px;
      margin: 0 auto;
      border: 3px solid #f3f3f3;
      border-top: 3px solid black;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 1rem;
    }


    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      /* spacing between login and google button */
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #ccc;
      /* gray line */
    }

    .divider:not(:empty)::before {
      margin-right: 10px;
    }

    .divider:not(:empty)::after {
      margin-left: 10px;
    }

    .divider span {
      color: #888;
      font-size: 14px;
      white-space: nowrap;
    }

    /* Google Button */
    .google-btn {
      display: flex;
      text-align: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background-color: white !important;
      color: #3c4043 !important;
      border: 1px solid #dadce0;
      border-radius: 7px !important;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
      cursor: pointer;
      box-shadow: 0 5px 5px rgba(0, 0, 0, 0.1);
      transition: box-shadow 0.3s ease;
    }


    .google-btn:hover {
      box-shadow: none;
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .social-buttons {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin: 1rem auto;
      width: fit-content;
    }

    .social-btn {
      /* flex: 1; */
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      text-align: center;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .nav-hamburger {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <h1><a href="./">
        <img id="navbar-logo" width="80px" src="logo-vision_X.png" alt="logo Vision x"> Vision X</a>
    </h1>

    <div id="navbar-links" class="nav-links align-items-center">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="courses.html">Courses</a>
      <a href="./login.html" class="btn login">Log In</a>
      <a href="./signup.html" class="btn signup">Sign Up</a>
    </div>
    <div class="nav-toggle align-items-center justify-content-center" onclick="toggleNav()">
      <svg viewBox="0 0 18 18" id="navbar-barger-logo" class="nav-hamburger">
        <polyline id="globalnav-menutrigger-bread-bottom" fill="none" stroke="currentColor" stroke-width="1.2"
          stroke-linecap="round" stroke-linejoin="round" points="2 12, 16 12"
          class="globalnav-menutrigger-bread globalnav-menutrigger-bread-bottom"></polyline>
        <polyline id="globalnav-menutrigger-bread-top" fill="none" stroke="currentColor" stroke-width="1.2"
          stroke-linecap="round" stroke-linejoin="round" points="2 5, 16 5"
          class="globalnav-menutrigger-bread globalnav-menutrigger-bread-top"></polyline>
      </svg>
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" id="navbar-x-logo" class="bi bi-x-lg d-none"
        viewBox="0 0 16 16">
        <path
          d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z" />
      </svg>
    </div>
  </div>
  <div class="auth-wrapper">
    <div class="container">
      <a href="index.html"
        style="display: inline-block; margin-bottom: 10px; font-size: 14px; color: #555; text-decoration: none;">
        ← Back to Homepage
      </a>
      <h2>Login</h2>
      <form id="Login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required />
          <div id="emailFeedback" class="inline-feedback"></div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required />
          <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember Me</label>
        </div>

        <a href="#" class="forgot-password">Forgot Password?</a>

        <button type="submit" class="btn">Login</button>
        <div class="spinner" id="spinner"></div>

        <div class="divider">
          <span>or continue with</span>
        </div>

        <div class="input">
          <button id="google-login-btn" class="google-btn">
            <span class="google-logo">
              <svg class="google-icon" viewBox="0 0 533.5 544.3">
                <path fill="#4285F4"
                  d="M533.5 278.4c0-18.5-1.6-37.1-5-55.2H272v104.5h146.9c-6.4 34.7-25.7 64.1-54.9 83.5l89 69.4c52-47.8 80.5-118.3 80.5-202.2z" />
                <path fill="#34A853"
                  d="M272 544.3c73.6 0 135.4-24.3 180.5-65.9l-89-69.4c-24.7 16.6-56.4 26.2-91.5 26.2-70.4 0-130-47.6-151.3-111.5l-93.6 72.3c43.3 85.1 132.1 147.3 244.9 147.3z" />
                <path fill="#FBBC04"
                  d="M120.7 323.7c-10.4-30.7-10.4-63.6 0-94.3L27 157c-40.7 79.7-40.7 172 0 251.7l93.7-72.3z" />
                <path fill="#EA4335"
                  d="M272 107.7c38.6-.6 75.5 13.6 104 39.4l77.7-77.7C403.2 23.9 340.2-.2 272 0 159.2 0 70.5 62.2 27.2 147.3l93.6 72.4c21.4-63.9 81-111.5 151.2-112z" />
              </svg>
            </span>
            <span>Sign in with Google</span>
          </button>


          <div class="signup-page">
            <p>Don't have an account? <a href="signup.html"> Sign up</a></p>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { auth } from './src/js/firebase.js';
    import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
    import { redirectIfAuthenticated } from './src/js/auth-utils.js';

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }

    const form = document.getElementById("Login-form");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const emailFeedback = document.getElementById("emailFeedback");
    const spinner = document.getElementById("spinner");
    const googleLoginBtn = document.getElementById("google-login-btn");

    // Check if user is already logged in and redirect
    redirectIfAuthenticated();

    // Live email validation
    email.addEventListener("input", () => {
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      emailFeedback.textContent = regex.test(email.value)
        ? ""
        : "Enter a valid email address";
    });

    // Email/Password Login
    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // Final email format check before login
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email.value)) {
        alert("Please enter a valid email.");
        return;
      }

      if (password.value.length < 6) {
        alert("Password must be at least 6 characters long.");
        return;
      }

      spinner.style.display = "block";
      form.querySelector('button[type="submit"]').disabled = true;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email.value, password.value);
        console.log("User signed in:", userCredential.user);

        // Store login state in localStorage
        localStorage.setItem('userLoggedIn', 'true');
        localStorage.setItem('userEmail', userCredential.user.email);
        localStorage.setItem('userUID', userCredential.user.uid);

        alert("Login successful!");

        // Small delay to ensure auth state is updated
        setTimeout(() => {
          window.location.href = "index.html";
        }, 500);

      } catch (error) {
        console.error("Login error:", error);
        let errorMessage = "Login failed. Please try again.";

        switch (error.code) {
          case "auth/user-not-found":
            errorMessage = "No account found with this email.";
            break;
          case "auth/wrong-password":
            errorMessage = "Incorrect password.";
            break;
          case "auth/invalid-email":
            errorMessage = "Invalid email address.";
            break;
          case "auth/too-many-requests":
            errorMessage = "Too many failed attempts. Please try again later.";
            break;
          case "auth/network-request-failed":
            errorMessage = "Network error. Please check your internet connection.";
            break;
        }
        alert(errorMessage);
      } finally {
        spinner.style.display = "none";
        form.querySelector('button[type="submit"]').disabled = false;
      }
    });

    // Google Sign-In
    if (googleLoginBtn) {
      googleLoginBtn.addEventListener("click", async function (e) {
        e.preventDefault();
        spinner.style.display = "block";
        googleLoginBtn.disabled = true;

        try {
          const provider = new GoogleAuthProvider();
          provider.addScope('email');
          provider.addScope('profile');

          const result = await signInWithPopup(auth, provider);
          console.log("Google sign-in successful:", result.user);

          // Store login state in localStorage
          localStorage.setItem('userLoggedIn', 'true');
          localStorage.setItem('userEmail', result.user.email);
          localStorage.setItem('userUID', result.user.uid);
          localStorage.setItem('userDisplayName', result.user.displayName || '');
          localStorage.setItem('userPhotoURL', result.user.photoURL || '');

          alert("Login successful!");

          // Small delay to ensure auth state is updated
          setTimeout(() => {
            window.location.href = "index.html";
          }, 500);

        } catch (error) {
          console.error("Google sign-in error:", error);
          if (error.code !== 'auth/popup-closed-by-user') {
            alert("Google sign-in failed. Please try again.");
          }
        } finally {
          spinner.style.display = "none";
          googleLoginBtn.disabled = false;
        }
      });
    }
  </script>
  <script src="./src/js/navbar.js"></script>
  <script src="./src/js/utils.js"></script>
</body>

</html>
